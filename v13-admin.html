<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMIIA · Vendredi 13 · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   RESET & VARIABLES
════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --noir:       #09080f;
  --surface:    rgba(255,255,255,0.06);
  --surface2:   rgba(255,255,255,0.10);
  --border:     rgba(255,255,255,0.1);
  --texte:      #f0e8f8;
  --texte-dim:  rgba(240,232,248,0.5);
  --or:         #ffd700;
  --intuitif:   #a78bfa;
  --stratege:   #38bdf8;
  --chanceux:   #4ade80;
  --temeraire:  #fb923c;
  --danger:     #ff4444;
  --success:    #4ade80;
}
html,body{
  height:100%; overflow:hidden;
  background:var(--noir);
  color:var(--texte);
  font-family:'Nunito',sans-serif;
}

/* ════════════════════════════════════════════════
   LAYOUT GRAND ÉCRAN 16/9
   ┌─────────────────────────────────────────────┐
   │  TOPBAR : logo | scores équipes | stats     │
   ├──────────┬───────────────────┬──────────────┤
   │ JOUEURS  │   ZONE CENTRALE   │  MISSIONS    │
   │ (liste)  │ slot+roue+chrono  │  (liste)     │
   └──────────┴───────────────────┴──────────────┘
════════════════════════════════════════════════ */
body{ display:flex; flex-direction:column; }

/* ── TOPBAR ── */
#topbar{
  height:72px; flex-shrink:0;
  display:flex; align-items:center; gap:16px;
  padding:0 20px;
  background:rgba(0,0,0,.4);
  border-bottom:1px solid var(--border);
}
.logo-admin{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.1rem; letter-spacing:.35em;
  color:rgba(255,255,255,.4);
  white-space:nowrap;
}
.logo-admin span{ color:var(--or); }
.topbar-sep{ width:1px; height:40px; background:var(--border); flex-shrink:0; }
.scores-equipes{ display:flex; gap:12px; flex:1; }
.score-eq{
  display:flex; align-items:center; gap:8px;
  padding:6px 14px;
  background:var(--surface); border-radius:50px;
  border:1px solid var(--border);
}
.score-eq-emoji{ font-size:1.1rem; }
.score-eq-nom{ font-family:'Bebas Neue',sans-serif; font-size:.9rem; letter-spacing:.06em; }
.score-eq-sousnom{ font-size:.65rem; color:rgba(255,255,255,.4); font-style:italic; }
.score-eq-pts{ font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--or); margin-left:4px; }
.topbar-stats{ display:flex; gap:16px; align-items:center; flex-shrink:0; }
.stat-pill{ font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--texte-dim); }
.stat-pill b{ color:var(--texte); font-size:.9rem; }
.btn-reset{
  padding:6px 14px; background:transparent;
  border:1px solid rgba(255,68,68,.4); border-radius:50px;
  color:rgba(255,68,68,.7); font-size:.65rem; letter-spacing:.1em;
  text-transform:uppercase; cursor:pointer; transition:all .2s;
}
.btn-reset:hover{ background:rgba(255,68,68,.1); color:var(--danger); }

/* ── MAIN 3 COLONNES ── */
#main{ flex:1; display:grid; grid-template-columns:280px 1fr 300px; overflow:hidden; }

/* ════════════════════════════════════════════════
   COLONNE GAUCHE — LISTE JOUEURS
════════════════════════════════════════════════ */
#col-joueurs{
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.col-header{
  padding:12px 16px; border-bottom:1px solid var(--border);
  font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:.1em;
  color:var(--texte-dim); flex-shrink:0;
}
#joueurs-list{
  flex:1; overflow-y:auto; padding:8px;
  display:flex; flex-direction:column; gap:6px;
}
#joueurs-list::-webkit-scrollbar{ width:4px; }
#joueurs-list::-webkit-scrollbar-track{ background:transparent; }
#joueurs-list::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.15); border-radius:2px; }

.joueur-card{
  padding:10px 12px; border-radius:12px;
  background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
  transition:all .3s; cursor:default;
}
.joueur-card.performer{
  background:rgba(255,215,0,.12);
  border-color:var(--or);
  box-shadow:0 0 20px rgba(255,215,0,.2);
  animation:glow-pulse 1.5s ease-in-out infinite;
}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.2)}50%{box-shadow:0 0 30px rgba(255,215,0,.4)}}
.joueur-eq-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.joueur-nom{ font-weight:800; font-size:.88rem; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.joueur-role{ font-size:.7rem; color:var(--texte-dim); }
.joueur-pts{ font-family:'Bebas Neue',sans-serif; font-size:.85rem; color:var(--or); }
.joueur-crown{ font-size:.9rem; }
.joueur-deja{ opacity:.5; text-decoration:line-through; }

/* ════════════════════════════════════════════════
   COLONNE CENTRALE — ZONE DE JEU
════════════════════════════════════════════════ */
#col-centre{
  display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; padding:20px;
  gap:16px; overflow-y:auto;
}

/* ── Slot machine tirage performer ── */
#slot-wrap{
  width:100%; max-width:500px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:16px 20px; text-align:center;
}
.slot-label{ font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--texte-dim); margin-bottom:10px; }
#slot-display{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,3vw,2.8rem);
  letter-spacing:.04em; color:var(--texte);
  min-height:56px; display:flex; align-items:center; justify-content:center;
  border:2px solid var(--border); border-radius:12px;
  background:rgba(0,0,0,.3); padding:8px 20px;
  overflow:hidden; position:relative;
}
#slot-display.spinning{ color:var(--or); }
#slot-display.revealed{
  color:var(--or);
  border-color:var(--or);
  box-shadow:0 0 30px rgba(255,215,0,.3);
  animation:reveal-pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes reveal-pop{ from{transform:scale(.8);opacity:0} to{transform:none;opacity:1} }
.btn-tirer{
  margin-top:12px; width:100%;
  padding:14px; background:linear-gradient(135deg,var(--or),#ff9f2e);
  border:none; border-radius:50px; color:#1a0a00;
  font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.1em;
  cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(255,160,0,.3);
}
.btn-tirer:hover{ transform:translateY(-1px); box-shadow:0 6px 24px rgba(255,160,0,.4); }
.btn-tirer:active{ transform:scale(.97); }
.btn-tirer:disabled{ opacity:.4; cursor:default; transform:none; }

/* ── Roue des missions ── */
#roue-wrap{
  width:100%; max-width:500px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:16px 20px; text-align:center;
}
.roue-label{ font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--texte-dim); margin-bottom:10px; }
#roue-canvas{ border-radius:50%; display:block; margin:0 auto; box-shadow:0 0 30px rgba(255,215,0,.15); }
.btn-roue{
  margin-top:12px; width:100%;
  padding:14px; background:linear-gradient(135deg,#a78bfa,#7c3aed);
  border:none; border-radius:50px; color:#fff;
  font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.1em;
  cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(124,58,237,.3);
}
.btn-roue:hover{ transform:translateY(-1px); }
.btn-roue:active{ transform:scale(.97); }
.btn-roue:disabled{ opacity:.4; cursor:default; transform:none; }
#mission-result{
  margin-top:12px; padding:12px 16px;
  background:rgba(255,215,0,.08); border:1px solid rgba(255,215,0,.3);
  border-radius:12px; display:none;
}
#mission-result-titre{ font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:.04em; color:var(--or); }
#mission-result-desc{ font-size:.82rem; color:var(--texte-dim); margin-top:4px; line-height:1.5; }

/* ── Chrono ── */
#chrono-wrap{
  width:100%; max-width:500px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
#chrono-display{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5rem,10vw,8rem); line-height:1;
  color:var(--or); text-shadow:0 0 40px rgba(255,215,0,.4);
  display:none;
}
#chrono-display.urgent{ color:var(--danger); animation:blink .5s step-end infinite; text-shadow:0 0 40px rgba(255,68,68,.4); }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.btn-lancer{
  width:100%; max-width:500px;
  padding:14px; background:linear-gradient(135deg,#4ade80,#16a34a);
  border:none; border-radius:50px; color:#0a1a0a;
  font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.1em;
  cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(74,222,128,.3);
  display:none;
}
.btn-lancer:disabled{ opacity:.4; cursor:default; }

/* ── Résultats vote ── */
#vote-result-wrap{
  width:100%; max-width:500px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:16px 20px; display:none;
}
.vr-titre{ font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:.1em; color:var(--texte-dim); margin-bottom:10px; }
.vr-nb{ font-size:.75rem; color:var(--texte-dim); margin-bottom:8px; }
.vr-barre-wrap{ background:rgba(255,255,255,.06); border-radius:50px; height:20px; overflow:hidden; margin-bottom:6px; }
.vr-barre{ height:100%; border-radius:50px; background:linear-gradient(90deg,var(--or),#ff9f2e); transition:width 1s ease; width:0%; }
.vr-score{ font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--or); }
.vr-detail{ font-size:.72rem; color:var(--texte-dim); margin-top:4px; }
.btn-vote-open{
  width:100%; padding:12px;
  background:linear-gradient(135deg,#38bdf8,#0284c7);
  border:none; border-radius:50px; color:#fff;
  font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:.1em;
  cursor:pointer; transition:all .2s; margin-top:10px;
}
.btn-vote-close{
  width:100%; padding:12px;
  background:var(--surface); border:1px solid var(--border); border-radius:50px; color:var(--texte-dim);
  font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:.1em;
  cursor:pointer; transition:all .2s; margin-top:8px;
}

/* ════════════════════════════════════════════════
   COLONNE DROITE — MISSIONS
════════════════════════════════════════════════ */
#col-missions{
  border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
#missions-list{
  flex:1; overflow-y:auto; padding:8px;
  display:flex; flex-direction:column; gap:6px;
}
.mission-item{
  padding:10px 12px; border-radius:10px;
  background:var(--surface); border:1px solid var(--border);
  cursor:pointer; transition:all .2s;
}
.mission-item:hover{ background:var(--surface2); border-color:rgba(255,215,0,.3); }
.mission-item.active{ background:rgba(255,215,0,.1); border-color:var(--or); }
.mi-titre{ font-weight:800; font-size:.82rem; margin-bottom:3px; }
.mi-desc{ font-size:.7rem; color:var(--texte-dim); line-height:1.4; }
.mi-meta{ margin-top:5px; display:flex; gap:8px; }
.mi-duree{ font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--or); }
.mi-roles{ font-size:.62rem; color:var(--texte-dim); }

/* ════════════════════════════════════════════════
   VERSION BADGE
════════════════════════════════════════════════ */
#version-badge{ position:fixed; bottom:6px; right:8px; font-size:.5rem; letter-spacing:.15em; opacity:.25; color:#fff; font-family:monospace; z-index:999; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     TOPBAR
════════════════════════════════════════════ -->
<div id="topbar">
  <img src="Visage_Lumiia_horizontal_V2.png" alt="LUMIIA" style="height:36px;width:auto;opacity:.75;"> <span style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.2em;color:rgba(255,255,255,.4);">VENDREDI 13 · ADMIN</span>
  <div class="topbar-sep"></div>
  <div class="scores-equipes" id="scores-equipes">
    <!-- généré dynamiquement -->
  </div>

  <div class="topbar-stats">

    <button class="btn-reset" onclick="resetSoiree()">↺ Reset</button>
  </div>
</div>

<!-- ════════════════════════════════════════════
     MAIN
════════════════════════════════════════════ -->
<div id="main">

  <!-- ── Colonne gauche : joueurs ── -->
  <div id="col-joueurs">
    <div class="col-header">👥 Joueurs inscrits</div>
    <div id="joueurs-list">
      <div style="padding:20px;text-align:center;color:var(--texte-dim);font-size:.8rem;">
        En attente de joueurs…
      </div>

  <!-- ── Colonne centrale ── -->
  <div id="col-centre">

    <!-- Slot machine tirage performer -->
    <div id="slot-wrap">

      <div id="slot-display">— Appuie pour tirer —</div>
      <button class="btn-tirer" id="btn-tirer" onclick="tirerPerformer()">🎲 Tirer au sort</button>

    <div id="roue-wrap">
      <div class="roue-label">🎡 Roue des missions</div>
      <canvas id="roue-canvas" width="220" height="220"></canvas>
      <div id="mission-result">
        <div id="mission-result-titre">—</div>
        <div id="mission-result-desc">—</div>
      </div>
      <button class="btn-roue" id="btn-roue" onclick="spinRoue()">🎡 Faire tourner la roue</button>
    </div>

    <!-- Chrono + Lancer -->
    <div id="chrono-wrap">
      <div id="chrono-display">20</div>
      <button class="btn-lancer" id="btn-lancer" onclick="lancerChrono()">▶ Lancer la mission (20s)</button>
    </div>

    <!-- Résultats vote -->
    <div id="vote-result-wrap">
      <div class="vr-titre">🗳️ Résultats du vote</div>
      <div class="vr-nb" id="vr-nb">0 vote(s)</div>
      <div class="vr-barre-wrap"><div class="vr-barre" id="vr-barre"></div></div>
      <div class="vr-score" id="vr-score">—</div>
      <div class="vr-detail" id="vr-detail"></div>
      <button class="btn-vote-open" id="btn-vote-open" onclick="ouvrirVote()">📱 Ouvrir le vote sur les téléphones</button>
      <button class="btn-vote-close" id="btn-vote-close" onclick="fermerVote()" style="display:none">✕ Fermer le vote</button>
    </div>

  </div>

  <!-- ── Colonne droite : missions ── -->
  <div id="col-missions">
    <div class="col-header">⚡ Missions disponibles</div>
    <div id="missions-list">
      <!-- généré dynamiquement -->
    </div>
  </div>

</div>
<div id="version-badge">ADMIN v2.5</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, set, remove, onValue, serverTimestamp, get }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ════════════════════════════════════════════════
   CONFIG FIREBASE
════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyBPgjVFkzP88qX_hlFUFqL168XONfNIBA4",
  authDomain:        "lumiia-live.firebaseapp.com",
  databaseURL:       "https://lumiia-live-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "lumiia-live",
  storageBucket:     "lumiia-live.appspot.com",
  messagingSenderId: "823919513931",
  appId:             "1:823919513931:web:6f6f3c7c6d1699457b18ce"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ════════════════════════════════════════════════
   CONFIG ÉQUIPES
════════════════════════════════════════════════ */
const EQUIPES = {
  intuitif:  { nom:"Groupe A", sousnom:"L'Intuitif",   emoji:"🔮", col:"#a78bfa" },
  stratege:  { nom:"Groupe B", sousnom:"Le Stratège",  emoji:"♟️", col:"#38bdf8" },
  chanceux:  { nom:"Groupe C", sousnom:"Le Chanceux",  emoji:"🍀", col:"#4ade80" },
  temeraire: { nom:"Groupe D", sousnom:"Le Téméraire", emoji:"⚡", col:"#fb923c" },
};

/* ════════════════════════════════════════════════
   CONFIG RÔLES
════════════════════════════════════════════════ */
const ROLES_DEF = [
  { id:"eclaireur",  nom:"L'Éclaireur",  emoji:"🔦" },
  { id:"funambule",  nom:"Le Funambule",  emoji:"🎪" },
  { id:"oracle",     nom:"L'Oracle",      emoji:"🔮" },
  { id:"fantome",    nom:"Le Fantôme",    emoji:"👻" },
  { id:"trickster",  nom:"Le Trickster",  emoji:"🃏" },
];

/* ════════════════════════════════════════════════
   CONFIG MISSIONS
   → Modifier ICI pour changer les missions
   → Format : { titre, desc, roles, duree }
   → roles: ["all"] = tout le monde, ou liste d'ids de rôles
   → duree: en secondes (default 20)
════════════════════════════════════════════════ */
const MISSIONS = [
  { titre:"Imitation éclair",        desc:"Imite quelqu'un dans la salle sans le nommer. Le public doit deviner qui.",               roles:["eclaireur","funambule"], duree:20 },
  { titre:"La pose légendaire",       desc:"Invente et tiens une pose héroïque pendant le chrono sans bouger ni rire.",              roles:["oracle","fantome"],     duree:20 },
  { titre:"Le vendeur fou",           desc:"Vends-nous un objet aléatoire de la salle comme si c'était le trésor du siècle.",       roles:["trickster","eclaireur"],duree:20 },
  { titre:"La prophétie",             desc:"Annonce la grande prophétie de la soirée. Elle doit commencer par 'Ce soir…'",          roles:["oracle"],               duree:20 },
  { titre:"Le mime express",          desc:"Mime un film connu. Ton équipe peut deviner, les autres doivent se taire.",              roles:["funambule","fantome"],   duree:20 },
  { titre:"Le discours passionné",    desc:"Donne un discours enflammé sur un sujet complètement ridicule.",                        roles:["eclaireur","trickster"], duree:20 },
  { titre:"La danse du Vendredi 13",  desc:"Invente et exécute ta propre 'Danse du Vendredi 13'. Originalité maximale.",            roles:["funambule"],             duree:20 },
  { titre:"Le sosie vocal",           desc:"Imite la voix d'une célébrité et prononce une phrase de la soirée.",                   roles:["trickster","oracle"],    duree:20 },
  { titre:"Convaincre en 20s",        desc:"Convaincs 3 personnes de lever la main pour te soutenir. À toi de jouer.",              roles:["fantome","eclaireur"],   duree:20 },
  { titre:"DÉFI D'ÉQUIPE",            desc:"Toute l'équipe doit se lever et former une figure reconnaissable le plus vite possible.",roles:["all"],                  duree:20 },
];

/* ════════════════════════════════════════════════
   CONFIG ROUE
   → Items affichés sur la roue (peut être différent des missions)
════════════════════════════════════════════════ */
const ROUE_ITEMS = MISSIONS.map(m=>m.titre.substring(0,18)+(m.titre.length>18?'…':''));
const COULEURS_ROUE = ['#a78bfa','#38bdf8','#4ade80','#fb923c','#ffd700','#ff6b9d','#818cf8','#34d399','#f472b6','#60a5fa'];

/* ════════════════════════════════════════════════
   AUDIO
════════════════════════════════════════════════ */
let audioCtx=null;
function getCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq,type,duration,vol=0.3,delay=0){
  const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type=type; o.frequency.setValueAtTime(freq,ctx.currentTime+delay);
  g.gain.setValueAtTime(vol,ctx.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+duration);
  o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+duration+0.05);
}
const SFX = {
  // Slot machine — tick rapide pendant le défilement
  slotTick:   ()=>{ playTone(600+(Math.random()*400),'square',.04,.15); },
  // Résultat tirage
  slotResult: ()=>{ [440,550,660,880].forEach((f,i)=>playTone(f,'triangle',.3,.25,i*.07)); },
  // Roue tourne — tick ralentissant
  roueTick:   ()=>{ playTone(440,'square',.05,.2); },
  // Roue s'arrête
  roueDing:   ()=>{ playTone(880,'sine',.3,.4); playTone(1100,'sine',.25,.3,.1); },
  // Go chrono
  go:         ()=>{ playTone(880,'square',.15,.3); playTone(1100,'square',.15,.3,.15); },
  // Bip urgence
  bip:        ()=>{ playTone(880,'square',.08,.4); },
  // Buzzer fin
  buzzer:     ()=>{ [220,180].forEach((f,i)=>playTone(f,'sawtooth',.4,.4,i*.1)); },
  // Vote ouvert
  voteOpen:   ()=>{ [520,660,784].forEach((f,i)=>playTone(f,'sine',.2,.2,i*.06)); },
};

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let joueurs = [];                  // liste complète des joueurs (Firebase)
let performerActuel = null;        // joueur actuellement performer {key, prenom, equipe, role}
let missionActuelle = null;        // mission sélectionnée par la roue
let chronoActif = false;
let chronoInt = null;
let voteOuvert = false;
let nbTours = 0;
let scoreEquipes = { intuitif:0, stratege:0, chanceux:0, temeraire:0 };
// Anti-répétition : file des 5 derniers performers (clés Firebase)
let derniersPerformers = [];

/* ════════════════════════════════════════════════
   ROUE — canvas
════════════════════════════════════════════════ */
let roueAngle = 0;
let roueSpin  = false;

function drawRoue(highlight=-1){
  const canvas = document.getElementById('roue-canvas');
  const ctx    = canvas.getContext('2d');
  const cx=110, cy=110, r=105, n=ROUE_ITEMS.length;
  ctx.clearRect(0,0,220,220);
  ROUE_ITEMS.forEach((item,i)=>{
    const a1=roueAngle+i*(2*Math.PI/n), a2=a1+(2*Math.PI/n);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a1,a2); ctx.closePath();
    ctx.fillStyle = i===highlight?'#fff':COULEURS_ROUE[i%COULEURS_ROUE.length];
    ctx.fill();
    ctx.save(); ctx.translate(cx,cy);
    ctx.rotate(a1+(a2-a1)/2);
    ctx.fillStyle = i===highlight?'#111':'rgba(0,0,0,.75)';
    ctx.font='bold 9px Nunito,sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(item.substring(0,16), r-6, 0);
    ctx.restore();
  });
  // Pointeur
  ctx.beginPath(); ctx.moveTo(cx+r+8,cy); ctx.lineTo(cx+r-12,cy-10); ctx.lineTo(cx+r-12,cy+10);
  ctx.closePath(); ctx.fillStyle='#ffd700'; ctx.fill();
}

window.spinRoue = () => {
  if(roueSpin || !performerActuel) return;
  roueSpin=true;
  document.getElementById('btn-roue').disabled=true;
  document.getElementById('mission-result').style.display='none';
  missionActuelle=null;
  document.getElementById('btn-lancer').style.display='none';
  document.getElementById('chrono-display').style.display='none';

  const n=ROUE_ITEMS.length;
  const tours=5+Math.random()*5;
  const targetIdx=Math.floor(Math.random()*n);
  const targetAngle=roueAngle+(tours*2*Math.PI)+targetIdx*(2*Math.PI/n);
  const startAngle=roueAngle;
  const duration=3000+Math.random()*2000;
  const startTime=performance.now();
  let lastTick=0;

  function animate(now){
    const elapsed=now-startTime;
    const t=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-t,4);
    roueAngle=startAngle+(targetAngle-startAngle)*ease;
    // tick sonore quand on passe une section
    const currentSector=Math.floor(((roueAngle/(2*Math.PI/n))%n+n)%n);
    if(currentSector!==lastTick){ SFX.roueTick(); lastTick=currentSector; }
    drawRoue();
    if(t<1){ requestAnimationFrame(animate); }
    else{
      roueAngle=targetAngle%(2*Math.PI);
      const idx=Math.floor(((2*Math.PI-roueAngle%(2*Math.PI/n)*n)/(2*Math.PI/n)+0.5+n)%n);
      const finalIdx=targetIdx;
      drawRoue(finalIdx);
      roueSpin=false;
      SFX.roueDing();
      missionActuelle=MISSIONS[finalIdx];
      document.getElementById('mission-result-titre').textContent=missionActuelle.titre;
      document.getElementById('mission-result-desc').textContent=missionActuelle.desc;
      document.getElementById('mission-result').style.display='block';
      document.getElementById('btn-lancer').style.display='block';
      document.getElementById('btn-lancer').textContent=`▶ Lancer la mission (${missionActuelle.duree}s)`;
    }
  }
  requestAnimationFrame(animate);
};

/* ════════════════════════════════════════════════
   SLOT MACHINE — tirage performer
   Anti-répétition : évite les 5 derniers performers
════════════════════════════════════════════════ */
window.tirerPerformer = () => {
  if(!joueurs.length){ alert('Aucun joueur inscrit !'); return; }
  const btn=document.getElementById('btn-tirer');
  btn.disabled=true;

  // Pool de joueurs éligibles (pas dans les 5 derniers)
  let pool=joueurs.filter(j=>!derniersPerformers.includes(j.key));
  if(!pool.length){ derniersPerformers=[]; pool=joueurs; } // reset si tout le monde est passé

  const winner=pool[Math.floor(Math.random()*pool.length)];
  const slot=document.getElementById('slot-display');
  slot.className='spinning';

  // Animation défilement
  let ticks=0;
  const maxTicks=20+Math.floor(Math.random()*10);
  const tickInterval=setInterval(()=>{
    const random=joueurs[Math.floor(Math.random()*joueurs.length)];
    slot.textContent=random.prenom;
    SFX.slotTick();
    ticks++;
    if(ticks>=maxTicks){
      clearInterval(tickInterval);
      // Résultat final
      slot.textContent=winner.prenom;
      slot.className='revealed';
      SFX.slotResult();
      performerActuel=winner;

      // Mise à jour anti-répétition
      derniersPerformers.push(winner.key);
      if(derniersPerformers.length>5) derniersPerformers.shift();

      // Notifier les clients via Firebase
      set(ref(db,'v13/etat'),{
        type:'performer',
        joueurKey:winner.key,
        performerNom:winner.prenom,
        equipe:winner.equipe,
        role:winner.role,
        actif:true,
        ts:serverTimestamp()
      });

      // Mettre le joueur en surbrillance dans la liste
      updateJoueursList();
      // Activer la roue
      document.getElementById('btn-roue').disabled=false;
      document.getElementById('vote-result-wrap').style.display='block';
      btn.disabled=false;
    }
  }, 80);
};

/* ════════════════════════════════════════════════
   CHRONO — lancer la mission
════════════════════════════════════════════════ */
window.lancerChrono = () => {
  if(!missionActuelle || !performerActuel) return;
  if(chronoActif) return;
  chronoActif=true;
  nbTours++;
  document.getElementById('nb-tours').textContent=nbTours;
  document.getElementById('btn-lancer').disabled=true;

  // Diffuser la mission sur les téléphones
  set(ref(db,'v13/etat'),{
    type:'mission',
    joueurKey:performerActuel.key,
    performerNom:performerActuel.prenom,
    equipe:performerActuel.equipe,
    role:performerActuel.role,
    missionTitre:missionActuelle.titre,
    missionDesc:missionActuelle.desc,
    duree:missionActuelle.duree,
    actif:true,
    ts:serverTimestamp()
  });

  // Chrono grand écran
  const el=document.getElementById('chrono-display');
  el.style.display='block';
  let t=missionActuelle.duree;
  el.textContent=t; el.className='';
  SFX.go();

  clearInterval(chronoInt);
  chronoInt=setInterval(()=>{
    t--; el.textContent=t;
    if(t<=5){ el.className='urgent'; SFX.bip(); }
    if(t<=0){
      clearInterval(chronoInt);
      SFX.buzzer();
      chronoActif=false;
      set(ref(db,'v13/etat'),{ type:'mission', actif:false, ts:serverTimestamp() });
      // Préparer le vote
      document.getElementById('btn-vote-open').style.display='block';
    }
  },1000);
};

/* ════════════════════════════════════════════════
   VOTE — ouvrir / fermer
════════════════════════════════════════════════ */
window.ouvrirVote = () => {
  if(!performerActuel) return;
  voteOuvert=true;
  SFX.voteOpen();
  // Effacer les anciens votes
  remove(ref(db,'v13/votes'));
  set(ref(db,'v13/etat'),{
    type:'vote',
    joueurKey:performerActuel.key,
    performerNom:performerActuel.prenom,
    actif:true,
    ts:serverTimestamp()
  });
  document.getElementById('btn-vote-open').style.display='none';
  document.getElementById('btn-vote-close').style.display='block';
};

window.fermerVote = () => {
  voteOuvert=false;
  set(ref(db,'v13/etat'),{ type:'vote', actif:false, ts:serverTimestamp() });
  document.getElementById('btn-vote-close').style.display='none';
  document.getElementById('btn-vote-open').style.display='block';
};

/* ════════════════════════════════════════════════
   RESET SOIRÉE
════════════════════════════════════════════════ */
window.resetSoiree = async () => {
  if(!confirm('Effacer tous les joueurs et votes ? Cette action est irréversible.')) return;
  // Signal reset pour effacer les sessions sur les téléphones
  await set(ref(db,'v13/reset'),{ ts: Date.now() });
  await Promise.all([
    remove(ref(db,'v13/joueurs')),
    remove(ref(db,'v13/votes')),
    remove(ref(db,'v13/etat')),
  ]);
  scoreEquipes={ intuitif:0, stratege:0, chanceux:0, temeraire:0 };
  derniersPerformers=[];
  performerActuel=null;
  nbTours=0;
  document.getElementById('nb-tours').textContent='0';
  document.getElementById('slot-display').textContent='— Appuie pour tirer —';
  document.getElementById('slot-display').className='';
  document.getElementById('mission-result').style.display='none';
  document.getElementById('chrono-display').style.display='none';
  document.getElementById('btn-lancer').style.display='none';
  document.getElementById('vote-result-wrap').style.display='none';
  buildScoresEquipes();
};

/* ════════════════════════════════════════════════
   UI — construire la liste des joueurs
════════════════════════════════════════════════ */
function updateJoueursList(){
  const container=document.getElementById('joueurs-list');
  if(!joueurs.length){
    container.innerHTML='<div style="padding:20px;text-align:center;color:var(--texte-dim);font-size:.8rem;">En attente de joueurs…</div>';
    return;
  }
  container.innerHTML='';
  joueurs.forEach(j=>{
    const eq=EQUIPES[j.equipe];
    const isPerformer=performerActuel && performerActuel.key===j.key;
    const deja=derniersPerformers.includes(j.key) && !isPerformer;
    const card=document.createElement('div');
    card.className='joueur-card'+(isPerformer?' performer':'')+(deja?' joueur-deja':'');
    card.innerHTML=`
      <div class="joueur-eq-dot" style="background:${eq?eq.col:'#fff'}"></div>
      <div class="joueur-nom">${esc(j.prenom)}</div>
      <div class="joueur-role">${ROLES_DEF.find(r=>r.id===j.role)?.emoji||'?'}</div>
      <div class="joueur-pts">${j.pointsPerso||0}pts</div>
      ${isPerformer?'<div class="joueur-crown">👑</div>':''}
    `;
    container.appendChild(card);
  });
}

/* ════════════════════════════════════════════════
   UI — scores équipes topbar
════════════════════════════════════════════════ */
function buildScoresEquipes(){
  const container=document.getElementById('scores-equipes');
  container.innerHTML='';
  Object.entries(EQUIPES).forEach(([key,eq])=>{
    const div=document.createElement('div');
    div.className='score-eq'; div.id=`score-eq-${key}`;
    div.innerHTML=`
      <span class="score-eq-emoji">${eq.emoji}</span>
      <span class="score-eq-nom" style="color:${eq.col}">${eq.nom}</span>
      <span class="score-eq-sousnom">${eq.sousnom}</span>
      <span class="score-eq-pts" id="pts-${key}">${scoreEquipes[key]||0}</span>
    `;
    container.appendChild(div);
  });
}

/* ════════════════════════════════════════════════
   UI — liste des missions
════════════════════════════════════════════════ */
function buildMissionsList(){
  const container=document.getElementById('missions-list');
  container.innerHTML='';
  MISSIONS.forEach((m,i)=>{
    const div=document.createElement('div');
    div.className='mission-item';
    div.id=`mission-item-${i}`;
    const rolesStr=m.roles.includes('all')?'Tous':m.roles.map(r=>ROLES_DEF.find(x=>x.id===r)?.emoji||r).join(' ');
    div.innerHTML=`
      <div class="mi-titre">${esc(m.titre)}</div>
      <div class="mi-desc">${esc(m.desc)}</div>
      <div class="mi-meta">
        <span class="mi-duree">⏱ ${m.duree}s</span>
        <span class="mi-roles">${rolesStr}</span>
      </div>
    `;
    // Clic = sélectionner manuellement
    div.onclick=()=>{
      document.querySelectorAll('.mission-item').forEach(el=>el.classList.remove('active'));
      div.classList.add('active');
      missionActuelle=m;
      document.getElementById('mission-result-titre').textContent=m.titre;
      document.getElementById('mission-result-desc').textContent=m.desc;
      document.getElementById('mission-result').style.display='block';
      document.getElementById('btn-lancer').style.display='block';
      document.getElementById('btn-lancer').textContent=`▶ Lancer la mission (${m.duree}s)`;
    };
    container.appendChild(div);
  });
}

/* ════════════════════════════════════════════════
   FIREBASE — écoute joueurs en temps réel
════════════════════════════════════════════════ */
onValue(ref(db,'v13/joueurs'), snap=>{
  joueurs=[];
  snap.forEach(c=>joueurs.push({key:c.key,...c.val()}));
  document.getElementById('nb-inscrits').textContent=joueurs.length;
  updateJoueursList();
});

/* ════════════════════════════════════════════════
   FIREBASE — écoute votes en temps réel
════════════════════════════════════════════════ */
onValue(ref(db,'v13/votes'), snap=>{
  const votes=[];
  snap.forEach(c=>votes.push(c.val()));
  if(!votes.length){ document.getElementById('vr-nb').textContent='0 vote(s)'; return; }

  const nbVotes=votes.length;
  const totalEtoiles=votes.reduce((a,v)=>a+(v.noteEtoiles||0),0);
  const totalPerso=votes.reduce((a,v)=>a+(v.pointsPerso||0),0);
  const moyEtoiles=(totalEtoiles/nbVotes).toFixed(1);
  const pct=Math.round((totalEtoiles/(nbVotes*5))*100);

  document.getElementById('vr-nb').textContent=`${nbVotes} vote(s)`;
  document.getElementById('vr-barre').style.width=pct+'%';
  document.getElementById('vr-score').textContent=`${moyEtoiles}/5 ⭐`;
  document.getElementById('vr-detail').textContent=`Points équipe : +${Math.round(totalEtoiles)} pts · Points perso : +${totalPerso} pts`;

  // Mise à jour scores équipes quand vote fermé
  if(!voteOuvert && performerActuel && votes.length>0){
    scoreEquipes[performerActuel.equipe]=(scoreEquipes[performerActuel.equipe]||0)+Math.round(totalEtoiles);
    buildScoresEquipes();
    // Écrire dans Firebase pour que les clients voient leur score
    set(ref(db,'v13/scores'), scoreEquipes);
    // Mettre à jour pts affichés
    document.getElementById('pts-'+performerActuel.equipe).textContent = scoreEquipes[performerActuel.equipe];
  }
});

/* ════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════ */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
buildScoresEquipes();
buildMissionsList();
drawRoue();
document.getElementById('btn-roue').disabled=true;
document.getElementById('vote-result-wrap').style.display='none';
</script>
</body>
